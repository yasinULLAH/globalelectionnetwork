<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HyperCloud - Leading IoT and AI Solutions Provider for Smart Cities, Education, and Enterprise" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <title>HyperCloud - IoT & AI Solutions</title>
    <script type="module" crossorigin src="./index-CIujjelm.js"></script>
    <link rel="stylesheet" crossorigin href="./index-5DYh_qcB.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- ── TEAM SECTION: injected before footer after React mounts ── -->
    <script>
      const teamMembers = [
        { initials:'AW', name:'Abdul Wakeel',     role:'AI & IoT Consultant',               color:'linear-gradient(135deg,#2563eb,#3b82f6)' },
        { initials:'AR', name:'Adeel Ramdhan',    role:'Technical — Mobile App',             color:'linear-gradient(135deg,#0ea5e9,#38bdf8)' },
        { initials:'BB', name:'Basit Khan Bacha', role:'Sales & Marketing Director',         color:'linear-gradient(135deg,#f59e0b,#fbbf24)' },
        { initials:'AK', name:'Adnan Khan',       role:'Quality Assurance',                  color:'linear-gradient(135deg,#8b5cf6,#a78bfa)' },
        { initials:'MS', name:'Muntazir Ali Shan',role:'Creative Designer',                  color:'linear-gradient(135deg,#ec4899,#f472b6)' },
        { initials:'MO', name:'Modasir',          role:'Procurement & Logistics — China',    color:'linear-gradient(135deg,#14b8a6,#2dd4bf)' },
        { initials:'SK', name:'Saeed Ullah Khan', role:'Director Contract — KSA',            color:'linear-gradient(135deg,#f97316,#fb923c)' },
        { initials:'RM', name:'Raj Malook',       role:'Business Development — Riyadh',      color:'linear-gradient(135deg,#6366f1,#818cf8)' },
        { initials:'NK', name:'Noor Khan',        role:'Finance & Accounts',                 color:'linear-gradient(135deg,#06b6d4,#22d3ee)' },
      ];

      function buildTeamSection() {
        const sec = document.createElement('section');
        sec.id = 'team';
        sec.style.cssText = `
          background: linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 100%);
          padding: 80px 24px;
          font-family: 'Inter','Poppins',sans-serif;
        `;

        const cards = teamMembers.map(m => `
          <div style="
            background:#fff;
            border:1px solid #e2e8f0;
            border-radius:16px;
            padding:28px 20px;
            text-align:center;
            box-shadow:0 2px 12px rgba(37,99,235,.07);
            transition:transform .25s,box-shadow .25s;
            cursor:default;
          "
          onmouseover="this.style.transform='translateY(-6px)';this.style.boxShadow='0 12px 32px rgba(37,99,235,.15)'"
          onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 2px 12px rgba(37,99,235,.07)'">
            <div style="
              width:64px;height:64px;border-radius:50%;
              background:${m.color};
              display:flex;align-items:center;justify-content:center;
              font-size:20px;font-weight:800;color:#fff;
              margin:0 auto 14px;
              box-shadow:0 4px 14px rgba(0,0,0,.15);
            ">${m.initials}</div>
            <div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:5px;">${m.name}</div>
            <div style="font-size:12px;color:#2563eb;font-weight:600;">${m.role}</div>
          </div>
        `).join('');

        sec.innerHTML = `
          <div style="max-width:1100px;margin:0 auto;">
            <div style="text-align:center;margin-bottom:52px;">
              <div style="
                display:inline-block;
                background:rgba(37,99,235,.1);
                border:1px solid rgba(37,99,235,.25);
                color:#2563eb;
                font-size:12px;font-weight:700;letter-spacing:2px;
                text-transform:uppercase;
                padding:6px 18px;border-radius:999px;margin-bottom:16px;
              ">Our Team</div>
              <h2 style="
                font-family:'Poppins',sans-serif;
                font-size:clamp(26px,4vw,40px);
                font-weight:800;color:#0f172a;margin:0 0 12px;
              ">The People Behind HyperCloud</h2>
              <p style="color:#64748b;font-size:16px;max-width:560px;margin:0 auto;line-height:1.6;">
                A multidisciplinary team of engineers, designers, and business experts driving innovation across IoT, AI, and enterprise solutions.
              </p>
            </div>
            <div style="
              display:grid;
              grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
              gap:20px;
            ">${cards}</div>
          </div>
        `;
        return sec;
      }

      function injectTeam() {
        // Try to find footer inside #root, insert before it
        const footer = document.querySelector('#root footer') || document.querySelector('footer');
        const section = buildTeamSection();
        if (footer) {
          footer.parentNode.insertBefore(section, footer);
        } else {
          // Fallback: append to root
          const root = document.getElementById('root');
          if (root) root.appendChild(section);
        }
      }

      // Wait for React to finish rendering
      const observer = new MutationObserver(() => {
        const footer = document.querySelector('#root footer') || document.querySelector('footer');
        if (footer && !document.getElementById('team')) {
          observer.disconnect();
          injectTeam();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Fallback timeout in case footer selector doesn't match
      setTimeout(() => {
        if (!document.getElementById('team')) {
          observer.disconnect();
          injectTeam();
        }
      }, 3000);
    </script>
    <!-- ── END TEAM SECTION ── -->

  </body>
</html>
